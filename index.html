<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MEDI8403 Gotcha Notes</title>
  <meta name="description" content="High-yield gotcha revision notes for MEDI8403 / MEDI8401 — cut-offs, discriminators and traps, verified against current Australian guidelines." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <button class="nav-toggle" id="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <div class="brand">
      <span class="b1">Gotcha<em>Notes</em></span>
      <span class="b2">MEDI8403 · the traps, not the textbook</span>
    </div>

    <div class="search-wrap">
      <input id="search" type="search" placeholder="Search every card — cut-offs, discriminators, traps…" autocomplete="off" aria-label="Search all cards" />
      <button class="search-clear" id="search-clear" type="button" aria-label="Clear search" hidden>×</button>
    </div>

    <button class="expand-all" id="expand-all" type="button" aria-pressed="false">Expand all</button>

    <button class="revise-btn" id="revise-btn" type="button" aria-haspopup="dialog" title="Your revision set — tick cards to collect them">
      Revise <span class="revise-count" id="revise-count">0</span>
    </button>

    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light/dark theme" title="Toggle theme">
      <span class="theme-icon" aria-hidden="true">◐</span>
    </button>
  </header>

  <div class="layout">
    <nav class="side" id="nav" aria-label="Modules"></nav>
    <div class="scrim" id="scrim" hidden></div>
    <main class="content" id="content"></main>
  </div>

  <!-- revision set tray -->
  <div class="revise-modal" id="revise-modal" hidden role="dialog" aria-modal="true" aria-label="Revision set">
    <div class="revise-panel">
      <div class="revise-head">
        <h2>Revision set <span id="revise-n">0</span></h2>
        <button class="revise-x" id="revise-close" type="button" aria-label="Close">×</button>
      </div>
      <div class="revise-empty" id="revise-empty">Tick the checkbox on any card to add it here, then copy it all for your notes or hand it to Claude.</div>
      <div class="revise-list" id="revise-list"></div>
      <textarea class="revise-text" id="revise-text" spellcheck="false" aria-label="Combined revision text"></textarea>
      <div class="revise-actions">
        <button id="revise-copy" type="button">Copy for my notes</button>
        <button id="revise-copy-claude" type="button">Copy for Claude</button>
        <button id="revise-clear" class="ghost" type="button">Clear all</button>
      </div>
    </div>
  </div>

  <!-- module data (each file self-registers into window.GOTCHA.modules) -->
  <script src="data/paediatrics.js"></script>
  <script src="data/gynaecology.js"></script>
  <script src="data/obstetrics.js"></script>
  <script src="data/cardiovascular.js"></script>
  <script src="data/respiratory.js"></script>
  <script src="data/gastroenterology.js"></script>
  <script src="data/renal.js"></script>
  <script src="data/endocrine.js"></script>
  <script src="data/neurology.js"></script>
  <script src="data/oncology.js"></script>
  <script src="data/infectious.js"></script>
  <script src="data/rheumatology.js"></script>
  <script src="data/dermatology.js"></script>
  <script src="data/eyesent.js"></script>
  <script src="data/immunology.js"></script>
  <script src="data/haematology.js"></script>
  <script src="data/surg-perioperative.js"></script>
  <script src="data/surg-acute-abdomen.js"></script>
  <script src="data/surg-vascular.js"></script>
  <script src="data/surg-urology.js"></script>
  <script src="data/surg-breast-endocrine.js"></script>
  <script src="data/surg-safety.js"></script>
  <script src="app.js"></script>
</body>
</html>
